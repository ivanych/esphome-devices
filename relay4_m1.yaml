substitutions:
  friendly_name: 'Relay4-M1'
  comment: "Реле с одним каналом, кнопкой и светодиодом на M1 (ESP32-C3 Super Mini)"
  timezone: "Europe/Moscow"
  project_author: "ivanych"
  project_version: '2.0.0'
  relay_pin: 10 # Номер пина, на котором работает реле

packages:
  common:
    url: https://github.com/ivanych/esphome-common
    files:
      - common.yaml
      - sensors.yaml
      - time.yaml
    ref: 0.3.0

  units: github://ivanych/esphome-units/relay4.yaml@4.1.0
  #units: !include ../esphome-units/relay4.yaml

  boards: github://ivanych/esphome-boards/m1.yaml@1.5.0
  #boards: !include ../esphome-boards/m1.yaml

# Для устройства нужна плата с интерфейсом Relay4 (реле, кнопка, светодиод),
# но плата M1 имеет интерфейс B1 (кнопка, светодиод)
# Нужно расширить B1 до Relay4, добавив реле.
output:
  # Реле
  - platform: gpio
    id: output_relay
    pin:
      number: ${relay_pin}
      inverted: true

text_sensor:
  # Номер пина, на котором работает реле
  - platform: template
    name: "Relay Pin"
    id: text_sensor_relay_pin
    icon: mdi:connection
    entity_category: diagnostic
    lambda: 'return {"${relay_pin}"};'
