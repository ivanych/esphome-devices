substitutions:
  friendly_name: 'Relay5-M1'
  comment: "Реле с одним каналом, кнопкой, светодиодом и внешним выключателем на M1 (ESP32-C3 Super Mini)"
  relay_pin: 10           # Номер пина, на котором работает реле
  external_switch_pin: 3  # Номер пина, на котором работает внешний выключатель

packages:
  common:
    url: https://github.com/ivanych/esphome-common
    files:
      - common.yaml
      - sensors.yaml
      - time.yaml
    ref: 1.0.0

  units: github://ivanych/esphome-units/relay5.yaml@5.0.0
  #units: !include ../esphome-units/relay5.yaml

  boards: github://ivanych/esphome-boards/m1.yaml@1.5.0
  #boards: !include ../esphome-boards/c1.yaml

# Для устройства нужна плата с интерфейсом Relay5 (реле, кнопка, светодиод, внешний выключатель),
# но плата M1 имеет интерфейс B1 (кнопка, светодиод).
# Нужно расширить B1 до Relay5, добавив реле и внешний выключатель.
output:
  # Реле
  - platform: gpio
    id: output_relay
    pin:
      number: ${relay_pin}
      inverted: true

binary_sensor:
  # Внешний выключатель
  - platform: gpio
    name: "External switch"
    id: binary_sensor_external_switch
    pin:
      number: ${external_switch_pin}
      inverted: false
    filters:
      - delayed_on: ${debounce_delay}

# Для удобства работы нужно вывести в интерфейсе номера пинов,
# используемых для добавленных реле и внешнего выключателя.
text_sensor:
  # Номер пина, на котором работает реле
  - platform: template
    name: "[ext] Relay Pin"
    id: text_sensor_relay_pin
    icon: mdi:connection
    entity_category: diagnostic
    lambda: 'return {"${relay_pin}"};'
  # Номер пина, на котором работает внешний выключатель
  - platform: template
    name: "[ext] External switch Pin"
    id: text_sensor_external_switch_pin
    icon: mdi:connection
    entity_category: diagnostic
    lambda: 'return {"${external_switch_pin}"};'

# Плата M1 не имеет отдельного статусного светодиода, придётся
# добавить его, совместив со светодиодом на плате.
light:
  - platform: status_led
    id: light_status_led
    internal: true
    output: output_onboard_led
