substitutions:
  comment: "Relay5 (реле с одним каналом, светодиодом, кнопкой и выключателем)
            на N1 (NodeMCU-32S)"

packages:
  common:
    url: https://github.com/ivanych/esphome-common
    ref: 1.2.1
    files:
      - common.yaml
      - sensors.yaml
      - time.yaml
      - is_boot.yaml
      # Плата N1 не имеет отдельного статусного светодиода, придётся
      # добавить его, совместив со светодиодом на плате.
      - status_led.yaml

  units: github://ivanych/esphome-units/relay5.yaml@6.0.0
  #units: !include ../esphome-units/relay5.yaml

  # Relay5                                  N1
  # реле1         (output_relay_1)
  # светодиод1    (output_led_1)            *
  # кнопка1       (binary_sensor_button)    *
  # выключатель1  (binary_sensor_switch_1)

  boards:
    url: https://github.com/ivanych/esphome-boards
    ref: 3.0.1
    files:
      # Плата N1
      - n1.yaml

      # реле1
      - path: int/output_relay.yaml
        vars:
          pin:
            number: 16
            inverted: true
          exposed: true

      # выключатель1
      - path: int/binary_sensor_switch.yaml
        vars:
          pin:
            number: 21
          exposed: true
