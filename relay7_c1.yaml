substitutions:
  comment: "Relay7 (реле с двумя каналами, одной кнопкой и двумя выключателями)
            на C1 (Luatos CORE-ESP32)"

packages:
  common:
    url: https://github.com/ivanych/esphome-common
    files:
      - common.yaml
      - sensors.yaml
      - time.yaml
      - is_boot.yaml
    ref: 1.2.1

  units: github://ivanych/esphome-units/relay7.yaml@6.0.0
  #units: !include ../esphome-units/relay7.yaml

  boards: github://ivanych/esphome-boards/c1.yaml@3.0.1
  #boards: !include ../esphome-boards/c1.yaml

  # Relay7                                  C1
  # реле1         (output_relay_1)
  # реле2         (output_relay_2)
  # кнопка        (binary_sensor_button)    *
  # выключатель1  (binary_sensor_switch_1)
  # выключатель2  (binary_sensor_switch_2)

  # реле1
  output_relay_1: !include
    file: ../esphome-boards/int/output_relay.yaml
    vars:
      pin:
        number: 6
        inverted: true
      exposed: true

  # реле2
  output_relay_2: !include
    file: ../esphome-boards/int/output_relay.yaml
    vars:
      number: 2
      pin:
        number: 0
        inverted: true
      exposed: true

  # кнопка
  # уже есть на C1

  # выключатель1
  binary_sensor_switch_1: !include
    file: ../esphome-boards/int/binary_sensor_switch.yaml
    vars:
      pin:
        number: 10
      exposed: true

  # выключатель2
  binary_sensor_switch_2: !include
    file: ../esphome-boards/int/binary_sensor_switch.yaml
    vars:
      number: 2
      pin:
        number: 7
      exposed: true
